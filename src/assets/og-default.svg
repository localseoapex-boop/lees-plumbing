<?xml version="1.0" encoding="UTF-8"?>
<!--
  og-default.svg — editable source for the fallback social-share image.

  This SVG is the DESIGN source of truth. It is NOT referenced directly as
  og:image (social crawlers don't render SVG). Instead, scripts/generate-og.mjs
  rasterizes it to public/og-default.png at 1200x630 — the canonical OG size.

  Placeholder brand treatment only: brand colors and correct copy, no final
  design work yet. Edit colors/text here, then run `npm run og` (or any build)
  to regenerate.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient, brand dark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141a1a" />
      <stop offset="1" stop-color="#050707" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Accent bar, brand red -->
  <rect x="80" y="250" width="64" height="8" rx="4" fill="#D22727" />

  <!-- Brand name -->
  <text x="80" y="345" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#FFFFFF">
    Lee&#39;s Plumbing
  </text>

  <!-- Tagline -->
  <text x="80" y="415" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400" fill="#d4d6d6">
    Plumbing · Cache Valley, Utah
  </text>

  <!-- Footer / domain -->
  <text x="80" y="540" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#D22727">
    lees-plumbing-eosin.vercel.app
  </text>
</svg>
